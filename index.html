<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarkdownLab — Enterprise Editor</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- marked.js for markdown parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

<!-- highlight.js for code syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<!-- DOMPurify for sanitization -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

<style>
  :root {
    --bg-canvas: #0d1117;
    --bg-surface: #161b22;
    --bg-overlay: #21262d;
    --bg-muted: #1c2128;
    --border-default: #30363d;
    --border-muted: #21262d;
    --border-subtle: #484f58;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --text-link: #58a6ff;
    --accent-blue: #1f6feb;
    --accent-blue-light: #388bfd;
    --accent-green: #3fb950;
    --accent-purple: #8b949e;
    --accent-orange: #d29922;
    --accent-red: #f85149;
    --syntax-keyword: #ff7b72;
    --syntax-string: #a5d6ff;
    --syntax-comment: #8b949e;
    --syntax-number: #79c0ff;
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 12px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.4);
    --shadow-md: 0 4px 12px rgba(0,0,0,.5);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.6);
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --transition: 150ms cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--font-ui);
    background: var(--bg-canvas);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
  }

  /* ─── TOPBAR ─────────────────────────────────── */
  #topbar {
    height: 52px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border-default);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    position: relative;
    z-index: 100;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.3px;
    color: var(--text-primary);
    flex-shrink: 0;
  }

  .logo svg { width: 22px; height: 22px; fill: var(--text-primary); }

  .logo-badge {
    background: linear-gradient(135deg, #1f6feb, #388bfd);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .topbar-divider {
    width: 1px;
    height: 24px;
    background: var(--border-default);
    flex-shrink: 0;
  }

  /* View mode toggle */
  .view-toggle {
    display: flex;
    background: var(--bg-canvas);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: 3px;
    gap: 2px;
    flex-shrink: 0;
  }

  .view-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 500;
    border-radius: 4px;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
  }

  .view-btn:hover { background: var(--bg-overlay); color: var(--text-primary); }
  .view-btn.active {
    background: var(--bg-overlay);
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
  }

  .view-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* Topbar actions */
  .topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }

  .action-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    background: var(--bg-overlay);
    border: 1px solid var(--border-default);
    color: var(--text-secondary);
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 500;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
  }

  .action-btn:hover {
    background: var(--bg-surface);
    color: var(--text-primary);
    border-color: var(--border-subtle);
  }

  .action-btn svg { width: 14px; height: 14px; }

  .action-btn.primary {
    background: var(--accent-blue);
    border-color: transparent;
    color: white;
  }
  .action-btn.primary:hover { background: var(--accent-blue-light); }

  /* File info */
  .file-info {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 10px;
    background: var(--bg-canvas);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all var(--transition);
    min-width: 180px;
  }

  .file-info:hover { border-color: var(--border-subtle); }

  .file-info-icon { color: var(--accent-blue-light); }
  .file-info-icon svg { width: 14px; height: 14px; }

  .file-name-input {
    background: none; border: none; outline: none;
    color: var(--text-primary); font-family: var(--font-ui);
    font-size: 13px; font-weight: 500;
    width: 120px;
    cursor: pointer;
  }

  .file-name-input:focus { cursor: text; }

  /* Status dot */
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-orange);
    transition: background var(--transition);
    flex-shrink: 0;
  }
  .status-dot.saved { background: var(--accent-green); }

  /* ─── MAIN LAYOUT ─────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #workspace {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* ─── EDITOR PANE ─────────────────────────────── */
  #editor-pane {
    display: flex;
    flex-direction: column;
    background: var(--bg-canvas);
    border-right: 1px solid var(--border-default);
    transition: width var(--transition), flex var(--transition);
    overflow: hidden;
    min-width: 0;
  }

  .pane-header {
    height: 38px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border-default);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    flex-shrink: 0;
  }

  .pane-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .pane-badge {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  #editor-wrapper {
    flex: 1;
    overflow: hidden;
    position: relative;
    display: flex;
  }

  /* Line numbers */
  #line-numbers {
    flex-shrink: 0;
    padding: 16px 0 16px 0;
    min-width: 44px;
    text-align: right;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    background: var(--bg-canvas);
    border-right: 1px solid var(--border-muted);
    overflow: hidden;
    user-select: none;
    padding-right: 10px;
    padding-left: 8px;
  }

  .line-number { display: block; }

  #editor {
    flex: 1;
    padding: 16px;
    background: transparent;
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    border: none;
    outline: none;
    resize: none;
    overflow-y: auto;
    overflow-x: auto;
    white-space: pre;
    caret-color: var(--accent-blue-light);
    tab-size: 2;
    -webkit-font-smoothing: antialiased;
  }

  #editor::placeholder { color: var(--text-muted); white-space: pre-line; }
  #editor::selection { background: rgba(31,111,235,0.35); }

  /* ─── DIVIDER ─────────────────────────────────── */
  #divider {
    width: 5px;
    background: var(--border-default);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background var(--transition);
    position: relative;
    z-index: 10;
  }
  #divider:hover, #divider.dragging { background: var(--accent-blue); }

  #divider::after {
    content: '';
    position: absolute;
    inset: 0 -3px;
    z-index: 1;
  }

  /* ─── PREVIEW PANE ────────────────────────────── */
  #preview-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-canvas);
    overflow: hidden;
    min-width: 0;
  }

  #preview-content {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    scroll-behavior: smooth;
  }

  /* Scrollbar styling */
  #editor::-webkit-scrollbar,
  #preview-content::-webkit-scrollbar,
  #line-numbers::-webkit-scrollbar { width: 6px; height: 6px; }
  #editor::-webkit-scrollbar-track,
  #preview-content::-webkit-scrollbar-track { background: transparent; }
  #editor::-webkit-scrollbar-thumb,
  #preview-content::-webkit-scrollbar-thumb {
    background: var(--border-subtle);
    border-radius: 3px;
  }
  #editor::-webkit-scrollbar-thumb:hover,
  #preview-content::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ─── MARKDOWN RENDERING (GitHub style) ─────── */
  .md-body {
    font-family: var(--font-ui);
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-primary);
    max-width: 860px;
  }

  .md-body h1, .md-body h2, .md-body h3,
  .md-body h4, .md-body h5, .md-body h6 {
    font-weight: 600;
    line-height: 1.3;
    margin-top: 24px;
    margin-bottom: 12px;
    padding-bottom: 0;
    color: var(--text-primary);
  }

  .md-body h1 {
    font-size: 2em;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border-default);
    margin-bottom: 16px;
  }

  .md-body h2 {
    font-size: 1.5em;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-default);
    margin-bottom: 14px;
  }

  .md-body h3 { font-size: 1.25em; }
  .md-body h4 { font-size: 1em; }
  .md-body h5 { font-size: 0.875em; }
  .md-body h6 { font-size: 0.85em; color: var(--text-secondary); }

  .md-body p { margin-bottom: 16px; }
  .md-body p:last-child { margin-bottom: 0; }

  .md-body a {
    color: var(--text-link);
    text-decoration: none;
  }
  .md-body a:hover { text-decoration: underline; }

  .md-body strong { font-weight: 600; color: var(--text-primary); }
  .md-body em { font-style: italic; }

  .md-body ul, .md-body ol {
    margin-bottom: 16px;
    padding-left: 24px;
  }

  .md-body li { margin-bottom: 4px; }
  .md-body li + li { margin-top: 4px; }

  .md-body ul li { list-style: disc; }
  .md-body ul ul li { list-style: circle; }
  .md-body ul ul ul li { list-style: square; }

  .md-body blockquote {
    border-left: 4px solid var(--accent-blue);
    margin: 0 0 16px 0;
    padding: 8px 16px;
    color: var(--text-secondary);
    background: rgba(31,111,235,0.06);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
  }

  .md-body blockquote p { margin-bottom: 0; }

  .md-body code {
    font-family: var(--font-mono);
    font-size: 87%;
    background: var(--bg-overlay);
    color: #e89b8b;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border-muted);
  }

  .md-body pre {
    background: var(--bg-surface) !important;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: 16px;
    overflow-x: auto;
    margin-bottom: 16px;
    position: relative;
  }

  .md-body pre code {
    background: transparent;
    color: var(--text-primary);
    padding: 0;
    border: none;
    font-size: 13px;
    line-height: 1.6;
    border-radius: 0;
  }

  /* Code block header */
  .code-block-wrapper { position: relative; margin-bottom: 16px; }

  .code-block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-overlay);
    border: 1px solid var(--border-default);
    border-bottom: none;
    border-radius: var(--radius-md) var(--radius-md) 0 0;
    padding: 6px 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
  }

  .code-block-wrapper pre {
    margin-bottom: 0;
    border-radius: 0 0 var(--radius-md) var(--radius-md);
  }

  .copy-code-btn {
    background: none;
    border: 1px solid var(--border-default);
    color: var(--text-secondary);
    font-family: var(--font-ui);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: all var(--transition);
    display: flex; align-items: center; gap: 4px;
  }

  .copy-code-btn:hover { background: var(--bg-surface); color: var(--text-primary); border-color: var(--border-subtle); }
  .copy-code-btn.copied { color: var(--accent-green); border-color: var(--accent-green); }

  .md-body table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 16px;
    display: block;
    overflow-x: auto;
    font-size: 14px;
  }

  .md-body th, .md-body td {
    border: 1px solid var(--border-default);
    padding: 8px 14px;
    text-align: left;
  }

  .md-body th {
    background: var(--bg-surface);
    font-weight: 600;
    color: var(--text-primary);
  }

  .md-body tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
  .md-body tr:hover td { background: rgba(255,255,255,0.04); }

  .md-body hr {
    border: none;
    border-top: 1px solid var(--border-default);
    margin: 24px 0;
  }

  .md-body img {
    max-width: 100%;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
  }

  /* Checkbox lists */
  .md-body input[type="checkbox"] {
    accent-color: var(--accent-blue);
    margin-right: 6px;
    vertical-align: middle;
    cursor: pointer;
  }

  /* ─── EMPTY STATE ──────────────────────────────── */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-muted);
    text-align: center;
    padding: 40px;
  }

  #empty-state svg {
    opacity: 0.3;
    width: 64px;
    height: 64px;
  }

  #empty-state h3 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  #empty-state p {
    font-size: 13px;
    max-width: 280px;
    line-height: 1.6;
  }

  /* ─── STATUS BAR ──────────────────────────────── */
  #statusbar {
    height: 26px;
    background: var(--accent-blue);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 16px;
    flex-shrink: 0;
  }

  .status-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    font-family: var(--font-ui);
    white-space: nowrap;
  }

  .status-item svg { width: 11px; height: 11px; }
  .status-sep { color: rgba(255,255,255,0.3); font-size: 11px; }

  /* ─── VIEW MODES ───────────────────────────────── */
  body.mode-editor #divider,
  body.mode-editor #preview-pane { display: none; }
  body.mode-editor #editor-pane { flex: 1; border-right: none; }

  body.mode-preview #divider,
  body.mode-preview #editor-pane { display: none; }
  body.mode-preview #preview-pane { flex: 1; }

  body.mode-split #editor-pane { flex: 1; }
  body.mode-split #preview-pane { flex: 1; }

  /* ─── TOAST ─────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-overlay);
    border: 1px solid var(--border-default);
    color: var(--text-primary);
    padding: 10px 18px;
    border-radius: var(--radius-md);
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transition: all 300ms cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
    z-index: 9999;
    display: flex; align-items: center; gap: 8px;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  #toast svg { width: 15px; height: 15px; color: var(--accent-green); }

  /* ─── SCROLLSYNC INDICATOR ──────────────────────── */
  .sync-badge {
    display: flex; align-items: center; gap: 4px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    border: 1px solid transparent;
  }
  .sync-badge.on { color: var(--accent-green); border-color: rgba(63,185,80,0.3); background: rgba(63,185,80,0.1); }
  .sync-badge.off { color: var(--text-muted); border-color: var(--border-muted); background: transparent; }
  .sync-badge svg { width: 11px; height: 11px; }

  /* ─── WORD WRAP TOGGLE ──────────────────────────── */
  .wrap-badge {
    display: flex; align-items: center; gap: 4px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    border: 1px solid var(--border-muted);
    color: var(--text-muted);
  }
  .wrap-badge:hover { color: var(--text-secondary); }
  .wrap-badge svg { width: 11px; height: 11px; }

  /* ─── OUTLINE PANEL ─────────────────────────────── */
  #outline-panel {
    width: 220px;
    flex-shrink: 0;
    background: var(--bg-surface);
    border-left: 1px solid var(--border-default);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width var(--transition);
  }

  #outline-panel.hidden { width: 0; border-left: none; }

  .outline-header {
    height: 38px;
    display: flex; align-items: center; padding: 0 12px; gap: 6px;
    border-bottom: 1px solid var(--border-default);
    font-size: 11px; font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.8px;
    flex-shrink: 0;
  }

  #outline-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .outline-item {
    display: block;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text-secondary);
    text-decoration: none;
    cursor: pointer;
    transition: all var(--transition);
    border-left: 2px solid transparent;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .outline-item:hover { color: var(--text-primary); background: var(--bg-overlay); }
  .outline-item.active { color: var(--text-link); border-left-color: var(--accent-blue); background: rgba(31,111,235,0.06); }
  .outline-item[data-level="1"] { padding-left: 12px; font-weight: 500; }
  .outline-item[data-level="2"] { padding-left: 22px; }
  .outline-item[data-level="3"] { padding-left: 32px; font-size: 11px; }
  .outline-item[data-level="4"], .outline-item[data-level="5"], .outline-item[data-level="6"] { padding-left: 42px; font-size: 11px; color: var(--text-muted); }

  /* ─── PANE WRAPPER ──────────────────────────────── */
  #panes-wrapper {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ─── FIND BAR ───────────────────────────────────── */
  #find-bar {
    position: absolute;
    top: 8px; right: 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: 6px 8px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: var(--shadow-md);
    z-index: 200;
    transform: translateY(-10px);
    opacity: 0;
    pointer-events: none;
    transition: all var(--transition);
  }

  #find-bar.show { transform: translateY(0); opacity: 1; pointer-events: all; }

  #find-input {
    background: var(--bg-canvas);
    border: 1px solid var(--border-default);
    border-radius: 4px;
    color: var(--text-primary);
    font-family: var(--font-ui);
    font-size: 13px;
    padding: 4px 8px;
    outline: none;
    width: 220px;
  }

  #find-input:focus { border-color: var(--accent-blue); }

  .find-count { font-size: 12px; color: var(--text-muted); min-width: 40px; }

  .find-nav-btn {
    background: none; border: 1px solid var(--border-default);
    color: var(--text-secondary);
    width: 24px; height: 24px;
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
    font-size: 12px;

<script>
  // ─── CONFIGURATION ──────────────────────────────────────────
  const editor = document.getElementById('editor');
  const previewBody = document.getElementById('preview-body');
  const emptyState = document.getElementById('empty-state');
  const lineNumbers = document.getElementById('line-numbers');
  const editorStats = document.getElementById('editor-stats');
  const previewStats = document.getElementById('preview-stats');
  const sbWords = document.getElementById('sb-words');
  const sbChars = document.getElementById('sb-chars');
  const sbRead = document.getElementById('sb-read');
  const sbCursor = document.getElementById('sb-cursor');
  const sbMode = document.getElementById('sb-mode');
  const statusDot = document.getElementById('status-dot');
  const outlineList = document.getElementById('outline-list');
  const findBar = document.getElementById('find-bar');
  const findInput = document.getElementById('find-input');
  const findCount = document.getElementById('find-count');

  let currentMode = 'split';
  let scrollSyncEnabled = true;
  let wordWrap = false;
  let outlineOpen = false;
  let findMatches = [];
  let findIndex = 0;
  let saveTimer = null;

  // ─── MARKED.JS CONFIGURATION ─────────────────────────────────
  marked.setOptions({
    breaks: true,
    gfm: true,
    pedantic: false,
  });

  // Custom renderer for code blocks with copy button + lang label
  const renderer = new marked.Renderer();
  renderer.code = function(code, language) {
    const lang = language || 'plaintext';
    const highlighted = hljs.highlightAuto(typeof code === 'object' ? code.text : code, language ? [language] : undefined).value;
    return `<div class="code-block-wrapper">
      <div class="code-block-header">
        <span>${lang}</span>
        <button class="copy-code-btn" onclick="copyCode(this)">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="12" height="12">
            <rect x="5" y="1" width="9" height="11" rx="1"/><path d="M2 4v10a1 1 0 001 1h9"/>
          </svg>
          Copy
        </button>
      </div>
      <pre><code class="hljs language-${lang}">${highlighted}</code></pre>
    </div>`;
  };

  // Checkbox support in lists
  renderer.listitem = function(text) {
    if (typeof text === 'object') text = text.text || '';
    const taskMatch = text.match(/^\[([x ])\]\s/i);
    if (taskMatch) {
      const checked = taskMatch[1].toLowerCase() === 'x';
      const content = text.replace(/^\[[x ]\]\s/i, '');
      return `<li><input type="checkbox" ${checked ? 'checked' : ''} onclick="return false"> ${content}</li>`;
    }
    return `<li>${text}</li>`;
  };

  marked.use({ renderer });

  // ─── RENDER ───────────────────────────────────────────────────
  function renderMarkdown() {
    const src = editor.value;

    if (!src.trim()) {
      emptyState.style.display = 'flex';
      previewBody.style.display = 'none';
      previewBody.innerHTML = '';
      return;
    }

    emptyState.style.display = 'none';
    previewBody.style.display = 'block';

    let html = marked.parse(src);
    html = DOMPurify.sanitize(html, {
      ADD_ATTR: ['onclick', 'type', 'checked'],
      FORCE_BODY: true,
    });

    previewBody.innerHTML = html;
    updateOutline();
    updateStats();
  }

  // ─── STATS ────────────────────────────────────────────────────
  function updateStats() {
    const text = editor.value;
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    const chars = text.length;
    const lines = text.split('\n').length;
    const readMin = Math.max(1, Math.ceil(words / 200));

    editorStats.textContent = `${lines} lines`;
    previewStats.textContent = `${words} words`;
    sbWords.textContent = `${words} words`;
    sbChars.textContent = `${chars} chars`;
    sbRead.textContent = `${readMin} min read`;
  }

  // ─── LINE NUMBERS ─────────────────────────────────────────────
  function updateLineNumbers() {
    const lines = editor.value.split('\n').length;
    let html = '';
    for (let i = 1; i <= lines; i++) html += `<span class="line-number">${i}</span>`;
    lineNumbers.innerHTML = html;
    syncLineNumberScroll();
  }

  function syncLineNumberScroll() {
    lineNumbers.scrollTop = editor.scrollTop;
  }

  editor.addEventListener('scroll', syncLineNumberScroll);

  // ─── CURSOR POSITION ─────────────────────────────────────────
  function updateCursor() {
    const pos = editor.selectionStart;
    const text = editor.value.substring(0, pos);
    const lines = text.split('\n');
    const ln = lines.length;
    const col = lines[lines.length - 1].length + 1;
    sbCursor.textContent = `Ln ${ln}, Col ${col}`;
  }

  editor.addEventListener('click', updateCursor);
  editor.addEventListener('keyup', updateCursor);

  // ─── SCROLL SYNC ─────────────────────────────────────────────
  const previewContent = document.getElementById('preview-content');
  let isSyncingEditor = false, isSyncingPreview = false;

  editor.addEventListener('scroll', () => {
    if (!scrollSyncEnabled || isSyncingPreview) return;
    isSyncingEditor = true;
    const pct = editor.scrollTop / (editor.scrollHeight - editor.clientHeight);
    previewContent.scrollTop = pct * (previewContent.scrollHeight - previewContent.clientHeight);
    setTimeout(() => isSyncingEditor = false, 50);
  });

  previewContent.addEventListener('scroll', () => {
    if (!scrollSyncEnabled || isSyncingEditor) return;
    isSyncingPreview = true;
    const pct = previewContent.scrollTop / (previewContent.scrollHeight - previewContent.clientHeight);
    editor.scrollTop = pct * (editor.scrollHeight - editor.clientHeight);
    setTimeout(() => isSyncingPreview = false, 50);
  });

  function toggleSync() {
    scrollSyncEnabled = !scrollSyncEnabled;
    const badge = document.getElementById('sync-toggle');
    badge.className = `sync-badge ${scrollSyncEnabled ? 'on' : 'off'}`;
    badge.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 8l3-3v2h8V5l3 3-3 3v-2H4v2z"/></svg> Scroll Sync`;
  }

  // ─── WORD WRAP ────────────────────────────────────────────────
  function toggleWrap() {
    wordWrap = !wordWrap;
    editor.style.whiteSpace = wordWrap ? 'pre-wrap' : 'pre';
    editor.style.overflowX = wordWrap ? 'hidden' : 'auto';
    const badge = document.getElementById('wrap-toggle');
    badge.style.color = wordWrap ? 'var(--accent-green)' : '';
    badge.style.borderColor = wordWrap ? 'rgba(63,185,80,0.3)' : '';
  }

  // ─── VIEW MODES ───────────────────────────────────────────────
  function setMode(mode) {
    currentMode = mode;
    document.body.className = `mode-${mode}`;
    ['editor','split','preview'].forEach(m => {
      document.getElementById(`btn-${m}`).classList.toggle('active', m === mode);
    });
    const labels = { editor: 'Editor', split: 'Split View', preview: 'Preview' };
    sbMode.textContent = labels[mode];
    document.getElementById('divider').style.display = mode === 'split' ? '' : 'none';
  }

  // ─── OUTLINE ─────────────────────────────────────────────────
  function toggleOutline() {
    outlineOpen = !outlineOpen;
    document.getElementById('outline-panel').classList.toggle('hidden', !outlineOpen);
    document.getElementById('outline-toggle-btn').style.color = outlineOpen ? 'var(--text-primary)' : '';
  }

  function updateOutline() {
    const headings = previewBody.querySelectorAll('h1,h2,h3,h4,h5,h6');
    let html = '';
    if (!headings.length) {
      outlineList.innerHTML = '<div style="padding:16px 12px; font-size:12px; color:var(--text-muted);">No headings found</div>';
      return;
    }
    headings.forEach((h, i) => {
      const level = parseInt(h.tagName[1]);
      const text = h.textContent;
      const id = `outline-h-${i}`;
      h.id = id;
      html += `<a class="outline-item" data-level="${level}" href="#${id}" onclick="scrollToHeading('${id}', event)">${text}</a>`;
    });
    outlineList.innerHTML = html;
  }

  function scrollToHeading(id, e) {
    e.preventDefault();
    const el = document.getElementById(id);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.querySelectorAll('.outline-item').forEach(i => i.classList.remove('active'));
      e.target.classList.add('active');
    }
  }

  // ─── RESIZABLE DIVIDER ────────────────────────────────────────
  const divider = document.getElementById('divider');
  const editorPane = document.getElementById('editor-pane');
  const previewPane = document.getElementById('preview-pane');
  const panesWrapper = document.getElementById('panes-wrapper');

  let isDragging = false, startX = 0, startEditorWidth = 0;

  divider.addEventListener('mousedown', e => {
    isDragging = true;
    startX = e.clientX;
    startEditorWidth = editorPane.offsetWidth;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const delta = e.clientX - startX;
    const totalW = panesWrapper.offsetWidth - 5;
    let newW = startEditorWidth + delta;
    newW = Math.max(200, Math.min(totalW - 200, newW));
    editorPane.style.flex = 'none';
    editorPane.style.width = newW + 'px';
    previewPane.style.flex = '1';
    previewPane.style.width = '';
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      divider.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });

  // ─── FIND IN DOCUMENT ────────────────────────────────────────
  function toggleFind() {
    if (findBar.classList.contains('show')) {
      closeFindBar();
    } else {
      findBar.classList.add('show');
      findInput.focus();
      findInput.select();
    }
  }

  function closeFindBar() {
    findBar.classList.remove('show');
    clearHighlights();
    findCount.textContent = '—';
    findMatches = [];
    findIndex = 0;
  }

  findInput.addEventListener('input', doFind);
  findInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') e.shiftKey ? findPrev() : findNext();
    if (e.key === 'Escape') closeFindBar();
  });

  function doFind() {
    const query = findInput.value.trim();
    clearHighlights();
    findMatches = [];
    findIndex = 0;

    if (!query) { findCount.textContent = '—'; return; }

    const text = previewBody.innerHTML;
    if (!text) { findCount.textContent = '0/0'; return; }

    // Search in rendered text
    const walker = document.createTreeWalker(previewBody, NodeFilter.SHOW_TEXT);
    const nodes = [];
    let node;
    while (node = walker.nextNode()) nodes.push(node);

    const re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');

    nodes.forEach(textNode => {
      const matches = [...textNode.textContent.matchAll(re)];
      if (!matches.length) return;

      const parent = textNode.parentNode;
      const frag = document.createDocumentFragment();
      let lastIdx = 0;

      matches.forEach(match => {
        if (match.index > lastIdx) {
          frag.appendChild(document.createTextNode(textNode.textContent.slice(lastIdx, match.index)));
        }
        const mark = document.createElement('mark');
        mark.textContent = match[0];
        mark.style.cssText = 'background:rgba(210,153,34,0.5);color:var(--text-primary);border-radius:2px;padding:1px 0;';
        findMatches.push(mark);
        frag.appendChild(mark);
        lastIdx = match.index + match[0].length;
      });

      if (lastIdx < textNode.textContent.length) {
        frag.appendChild(document.createTextNode(textNode.textContent.slice(lastIdx)));
      }
      parent.replaceChild(frag, textNode);
    });

    findCount.textContent = findMatches.length ? `1/${findMatches.length}` : '0/0';
    if (findMatches.length) scrollToMatch(0);
  }

  function clearHighlights() {
    previewBody.querySelectorAll('mark').forEach(m => {
      m.replaceWith(document.createTextNode(m.textContent));
    });
    previewBody.normalize();
  }

  function scrollToMatch(idx) {
    if (!findMatches.length) return;
    findMatches.forEach((m, i) => {
      m.style.background = i === idx
        ? 'rgba(210,153,34,0.9)'
        : 'rgba(210,153,34,0.4)';
    });
    findMatches[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    findCount.textContent = `${idx + 1}/${findMatches.length}`;
  }

  function findNext() {
    if (!findMatches.length) return;
    findIndex = (findIndex + 1) % findMatches.length;
    scrollToMatch(findIndex);
  }

  function findPrev() {
    if (!findMatches.length) return;
    findIndex = (findIndex - 1 + findMatches.length) % findMatches.length;
    scrollToMatch(findIndex);
  }

  // ─── COPY / EXPORT ─────────────────────────────────────────────
  function copyCode(btn) {
    const pre = btn.closest('.code-block-wrapper').querySelector('code');
    navigator.clipboard.writeText(pre.textContent).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polyline points="2,8 6,12 14,4"/></svg> Copied!`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="12" height="12"><rect x="5" y="1" width="9" height="11" rx="1"/><path d="M2 4v10a1 1 0 001 1h9"/></svg> Copy`;
      }, 2000);
    });
  }

  function copyMarkdown() {
    navigator.clipboard.writeText(editor.value).then(() => showToast('Markdown copied to clipboard'));
  }

  function copyHtml() {
    const html = previewBody.innerHTML;
    navigator.clipboard.writeText(html).then(() => showToast('HTML copied to clipboard'));
  }

  function downloadMd() {
    const filename = document.getElementById('filename-input').value || 'document.md';
    const blob = new Blob([editor.value], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    a.click(); URL.revokeObjectURL(url);
    showToast(`Downloaded ${filename}`);
  }

  // ─── TOAST ──────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    clearTimeout(toastTimer);
    document.getElementById('toast-msg').textContent = msg;
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ─── SAVE STATUS ─────────────────────────────────────────────
  function markModified() {
    statusDot.className = 'status-dot';
    statusDot.title = 'Modified';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      statusDot.className = 'status-dot saved';
      statusDot.title = 'Saved';
    }, 1500);
  }

  // ─── KEYBOARD SHORTCUTS ──────────────────────────────────────
  document.addEventListener('keydown', e => {
    const mod = e.ctrlKey || e.metaKey;
    if (mod && e.key === '1') { e.preventDefault(); setMode('editor'); }
    if (mod && e.key === '2') { e.preventDefault(); setMode('split'); }
    if (mod && e.key === '3') { e.preventDefault(); setMode('preview'); }
    if (mod && e.key === 'f') { e.preventDefault(); toggleFind(); }
    if (mod && e.key === 's') { e.preventDefault(); downloadMd(); }

    // Tab in editor
    if (e.key === 'Tab' && document.activeElement === editor) {
      e.preventDefault();
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.slice(0, start) + '  ' + editor.value.slice(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
      handleInput();
    }
  });

  // ─── MAIN INPUT HANDLER ───────────────────────────────────────
  function handleInput() {
    renderMarkdown();
    updateLineNumbers();
    markModified();
  }

  editor.addEventListener('input', handleInput);

  // ─── PASTE ENHANCEMENT ───────────────────────────────────────
  editor.addEventListener('paste', () => {
    setTimeout(handleInput, 10);
  });

  // ─── DRAG & DROP FILES ────────────────────────────────────────
  editor.addEventListener('dragover', e => { e.preventDefault(); editor.style.background = 'rgba(31,111,235,0.05)'; });
  editor.addEventListener('dragleave', () => { editor.style.background = ''; });
  editor.addEventListener('drop', e => {
    e.preventDefault();
    editor.style.background = '';
    const file = e.dataTransfer.files[0];
    if (file && (file.name.endsWith('.md') || file.name.endsWith('.txt') || file.name.endsWith('.markdown'))) {
      const reader = new FileReader();
      reader.onload = ev => {
        editor.value = ev.target.result;
        document.getElementById('filename-input').value = file.name;
        handleInput();
        showToast(`Loaded ${file.name}`);
      };
      reader.readAsText(file);
    }
  });
